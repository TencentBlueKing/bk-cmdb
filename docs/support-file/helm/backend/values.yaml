    ## @param mongodb.externalMongodb.rsName mongodb replicaset name
    ##
    rsName: rs0
    ## @param mongodb.externalMongodb.socketTimeoutSeconds mongodb socket timeout
    ## mongo的socket连接的超时时间，以秒为单位，默认10s，最小5s，最大30s。
    ##

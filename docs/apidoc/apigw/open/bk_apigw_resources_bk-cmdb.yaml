  /api/v3/findmany/set/bk_biz_id/{bk_biz_id}:
    post:
      operationId: find_set_batch
      description: 批量查询某业务的集群详情
      parameters:
        - name: bk_biz_id
          in: path
          required: true
          schema:
            type: integer
          description: 业务ID
          example: 3
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - bk_biz_id
                - bk_ids
                - fields
              properties:
                bk_biz_id:
                  type: integer
                  description: 业务ID
                  example: 3
                bk_ids:
                  type: array
                  items:
                    type: integer
                  description: 集群实例ID列表，即bk_set_id列表，最多可填500个
                  example: [11, 12]
                fields:
                  type: array
                  items:
                    type: string
                  description: 集群属性列表，控制返回结果的集群信息里有哪些字段
                  example: ['bk_set_id', 'bk_set_name', 'create_time']
      responses:
        '200':
          description: 成功响应

openapi: 3.0.1
info:
  title: API Gateway Resources
  description: ""
  version: "0.1"
servers:
  - url: /
paths:
  /api/v3/biz/status/{flag}/{bk_supplier_account}/{bk_biz_id}:
    put:
      operationId: update_business_enable_status
      description: 修改业务启用状态
      parameters:
        - name: flag
          in: path
          required: true
          schema:
            type: string
          description: 启用状态，为disabled或者enable
          example: enable
        - name: bk_supplier_account
          in: path
          required: true
          schema:
            type: string
          description: 开发商账号
          example: '0'
        - name: bk_biz_id
          in: path
          required: true
          schema:
            type: integer
          description: 业务id
          example: 3
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                bk_biz_id:
                  type: integer
                  description: 业务id
                  example: 3
                flag:
                  type: string
                  description: 启用状态，为disabled或者enable
                  example: enable
      responses:
        '200':
          description: 成功响应
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: boolean
                    description: 请求成功与否。true:请求成功；false请求失败
                    example: true
                  code:
                    type: integer
                    description: 错误编码。0表示success，>0表示失败错误
                    example: 0
                  message:
                    type: string
                    description: 请求失败返回的错误信息
                    example: success
                  permission:
                    type: object
                    description: 权限信息
                    example: null
                  data:
                    type: object
                    description: 请求返回的数据
                    example: success
        default:
          description: ''
      x-bk-apigateway-resource:
        isPublic: false
        allowApplyPermission: true
        matchSubpath: false
        backend:
          type: HTTP
          method: put
          path: /api/v3/biz/status/{flag}/{bk_supplier_account}/{bk_biz_id}
          matchSubpath: false
          timeout: 0
          upstreams: {}
          transformHeaders: {}
        pluginConfigs:
          - type: bk-rate-limit
            yaml: |
              rates:
                __default:
                - period: 1
                  tokens: 100
        authConfig:
          userVerifiedRequired: false
        disabledStages: []
        descriptionEn: Update business enable status

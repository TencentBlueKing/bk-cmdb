  /api/v3/find/instassociation/object/{bk_obj_id}:
    post:
      operationId: search_inst
      description: 根据关联关系实例查询模型实例
      parameters:
        - name: bk_obj_id
          in: path
          required: true
          schema:
            type: string
          description: 模型ID
          example: bk_switch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - bk_obj_id
                - page
              properties:
                bk_obj_id:
                  type: string
                  description: 模型ID
                  example: bk_switch
                page:
                  type: object
                  description: 分页参数
                  required:
                    - start
                    - limit
                  properties:
                    start:
                      type: integer
                      description: 记录开始位置
                      example: 0
                    limit:
                      type: integer
                      description: 每页限制条数，最大200
                      example: 10
                    sort:
                      type: string
                      description: 排序字段
                      example: bk_inst_id
                condition:
                  type: object
                  description: 具有关联关系的模型实例查询条件。key 为模型名，value 为条件规则数组
                  additionalProperties:
                    type: array
                    items:
                      type: object
                      required:
                        - field
                        - operator
                        - value
                      properties:
                        field:
                          type: string
                          description: 取值为模型的字段名
                          example: operator
                        operator:
                          type: string
                          description: 取值为 $regex、$eq 或 $ne
                          enum:
                            - $regex
                            - $eq
                            - $ne
                          example: $regex
                        value:
                          type: string
                          description: field 配置的模型字段所对应的值
                          example: admin
                  example: {}
                time_condition:
                  type: object
                  description: 按时间查询模型实例的查询条件
                  properties:
                    oper:
                      type: string
                      description: 操作符，目前只支持and
                      example: and
                    rules:
                      type: array
                      items:
                        type: object
                        properties:
                          field:
                            type: string
                            description: 取值为模型的字段名
                            example: create_time
                          start:
                            type: string
                            description: 起始时间，格式为yyyy-MM-dd hh:mm:ss
                            example: '2021-05-13 01:00:00'
                          end:
                            type: string
                            description: 结束时间，格式为yyyy-MM-dd hh:mm:ss
                            example: '2021-05-14 01:00:00'
                fields:
                  type: object
                  description: 指定查询模型实例返回的字段，key 为模型 ID，value 为该模型要返回的属性字段数组
                  additionalProperties:
                    type: array
                    items:
                      type: string
                  example:
                    bk_switch: ['bk_asset_id', 'bk_inst_id', 'bk_inst_name', 'bk_obj_id']
      responses:
        '200':
          description: 成功响应
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: boolean
                    description: 请求成功与否。true:请求成功；false请求失败
                    example: true
                  code:
                    type: integer
                    description: 错误编码。0表示success，>0表示失败错误
                    example: 0
                  message:
                    type: string
                    description: 请求失败返回的错误信息
                    example: success
                  permission:
                    type: object
                    description: 权限信息
                    example: null
                  data:
                    type: object
                    description: 请求返回的数据
                    properties:
                      count:
                        type: integer
                        description: 记录条数
                        example: 2
                      info:
                        type: array
                        description: 模型实例实际数据
                        items:
                          type: object
                          properties:
                            bk_asset_id:
                              type: string
                              example: sw00001
                            bk_inst_id:
                              type: integer
                              example: 1
                            bk_inst_name:
                              type: string
                              example: sw1
                            bk_obj_id:
                              type: string
                              example: bk_switch
        default:
          description: ''
      x-bk-apigateway-resource:
        isPublic: false
        allowApplyPermission: true
        matchSubpath: false
        backend:
          type: HTTP
          method: post
          path: /api/v3/find/instassociation/object/{bk_obj_id}
          matchSubpath: false
          timeout: 0
          upstreams: {}
          transformHeaders: {}
        pluginConfigs:
          - type: bk-rate-limit
            yaml: |
              rates:
                __default:
                - period: 1
                  tokens: 100
        authConfig:
          userVerifiedRequired: false
        disabledStages: []
        descriptionEn: Search object instance based on the association relationship instance

                    type: boolean
                    description: 请求成功与否。true:请求成功；false请求失败
                    example: true
                  code:
                    type: integer
                    description: 错误编码。0表示success，>0表示失败错误
                    example: 0
                  message:
                    type: string
                    description: 请求失败返回的错误信息
                    example: success
                  permission:
                    type: object
                    description: 权限信息
                    example: null
                  data:
                    type: array
                    description: 请求返回的数据
                    items:
                      type: object
                      properties:
                        bk_set_id:
                          type: integer
                          description: 集群id
                          example: 12
                        bk_set_name:
                          type: string
                          description: 集群名称
                          example: ss1
                        create_time:
                          type: string
                          description: 创建时间
                          example: '2020-05-15T22:15:51.67+08:00'
                        default:
                          type: integer
                          description: 0-普通集群，1-内置模块集合，默认为0
                          example: 0
                        bk_biz_id:
                          type: integer
                          description: 业务id
                          example: 3
                        bk_capacity:
                          type: integer
                          description: 设计容量
                          example: 0
                        bk_parent_id:
                          type: integer
                          description: 父节点的ID
                          example: 0
                        bk_service_status:
                          type: string
                          description: 服务状态:1/2(1:开放,2:关闭)
                          example: '1'
                        bk_set_desc:
                          type: string
                          description: 集群描述
                          example: ''
                        bk_set_env:
                          type: string
                          description: 环境类型：1/2/3(1:测试,2:体验,3:正式)
                          example: '1'
                        last_time:
                          type: string
                          description: 更新时间
                          example: ''
                        bk_supplier_account:
                          type: string
                          description: 开发商账号
                          example: '0'
                        description:
                          type: string
                          description: 数据的描述信息
                          example: ''
                        set_template_version:
                          type: array
                          description: 集群模板的当前版本
                          example: []
                        set_template_id:
                          type: integer
                          description: 集群模板ID
                          example: 0
                        bk_created_at:
                          type: string
                          description: 创建时间
                          example: ''
                        bk_updated_at:
                          type: string
                          description: 更新时间
                          example: ''
        default:
          description: ''
      x-bk-apigateway-resource:
        isPublic: false
        allowApplyPermission: true
        matchSubpath: false
        backend:
          type: HTTP
          method: post
          path: /api/v3/findmany/set/bk_biz_id/{bk_biz_id}
          matchSubpath: false
          timeout: 0
          upstreams: {}
          transformHeaders: {}
        pluginConfigs:
          - type: bk-rate-limit
            yaml: |
              rates:
                __default:
                - period: 1
                  tokens: 100
        authConfig:
          userVerifiedRequired: false
        disabledStages: []
        descriptionEn: Batch query the set details of a business

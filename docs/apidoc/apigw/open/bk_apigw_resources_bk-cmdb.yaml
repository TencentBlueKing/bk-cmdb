                  example: 0
                mainline_property_filters:
                  type: array
                  description: 自定义层级模型组合查询条件
                  items:
                    type: object
                    required:
                      - bk_obj_id
                      - filter
                    properties:
                      bk_obj_id:
                        type: string
                        description: 自定义层级模型id
                        example: test_custom_level_1
                      filter:
                        type: object
                        description: 目标的筛选条件，支持 AND/OR 组合，最多嵌套2层
                        properties:
                          condition:
                            type: string
                            enum: [AND, OR]
                            example: AND
                          rules:
                            type: array
                            items:
                              type: object
                              properties:
                                field:
                                  type: string
                                  example: bk_inst_name
                                operator:
                                  type: string
                                  enum:
                                    - equal
                                    - not_equal
                                    - in
                                    - not_in
                                    - less
                                    - less_or_equal
                                    - greater
                                    - greater_or_equal
                                    - between
                                    - not_between
                                  example: equal
                                value:
                                  description: 操作数
                  example: []
                set_property_filter:
                  type: object
                  description: 集群属性组合查询条件，支持 AND/OR 组合，最多嵌套2层
                  properties:
                    condition:
                      type: string
                      enum: [AND, OR]
                      example: AND
                    rules:
                      type: array
                      items:
                        type: object
                        properties:
                          field:
                            type: string
                            example: bk_set_name
                          operator:
                            type: string
                            enum:
                              - equal
                              - not_equal
                              - in
                              - not_in
                              - less
                              - less_or_equal
                              - greater
                              - greater_or_equal
                              - between
                              - not_between
                            example: equal
                          value:
                            description: 操作数
                  example:
                    condition: AND
                    rules: []
                module_property_filter:
                  type: object
                  description: 模块属性组合查询条件，支持 AND/OR 组合，最多嵌套2层
                  properties:
                    condition:
                      type: string
                      enum: [AND, OR]
                      example: AND
                    rules:
                      type: array
                      items:
                        type: object
                        properties:
                          field:
                            type: string
                            example: bk_module_name
                          operator:
                            type: string
                            enum:
                              - equal
                              - not_equal
                              - in
                              - not_in
                              - less
                              - less_or_equal
                              - greater
                              - greater_or_equal
                              - between
                              - not_between

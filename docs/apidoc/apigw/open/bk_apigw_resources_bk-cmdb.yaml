                    example: true
                  code:
                    type: integer
                    description: 错误编码。0表示success，>0表示失败错误
                    example: 0
                  message:
                    type: string
                    description: 请求失败返回的错误信息
                    example: ''
                  permission:
                    type: object
                    description: 权限信息
                    example: null
                  data:
                    type: object
